
<!DOCTYPE html>
<html>

<head>

<title>Quiz</title>

<style>

body{
    font-family:Arial;
    margin:40px;
}

textarea{
    width:100%;
    height:200px;
}

</style>

</head>

<body>

<h1>Quiz</h1>

Name

<br>

<input
id="studentName"
type="text">

<br><br>

Question

<br>

<textarea
id="answer"></textarea>

<br><br>

<button onclick="submitExam()">

Submit

</button>

<script>

let violations=[];

document.addEventListener(
    "copy",
    function(e){

        e.preventDefault();

        violations.push(
            "Copy Attempt"
        );

    });

document.addEventListener(
    "paste",
    function(e){

        e.preventDefault();

        violations.push(
            "Paste Attempt"
        );

    });

window.addEventListener(
    "blur",
    function(){

        violations.push(
            "Window Lost Focus"
        );

    });

document.addEventListener(
    "fullscreenchange",
    function(){

        if(!document.fullscreenElement){

            violations.push(
                "Exited Fullscreen"
            );

        }

    });

async function submitExam(){

    const url =
"https://script.google.com/macros/s/AKfycbyQhnM3h2Vy_Cr3rGxjMNXvPg1PpoW2wQASNvcPuKOgf7rMyGKuen8X7gEdX8fSwoofoA/exec";

    const params =
        new URLSearchParams();

    params.append(
        "student",
        document.getElementById(
            "studentName"
        ).value
    );

    params.append(
        "answer",
        document.getElementById(
            "answer"
        ).value
    );

    params.append(
        "violations",
        violations.join(", ")
    );

    try{

        const response =
            await fetch(url,{

                method:"POST",

                body:params

            });

        const text =
            await response.text();

        alert(text);

    }

    catch(err){

        console.error(err);

        alert(
            "Submission Failed"
        );

    }

}

</script>

</body>

</html>
